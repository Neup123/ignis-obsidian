name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to trigger the sync manually from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream changes
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main        # Your fork's branch to update
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main      # The original repo's branch to pull from
          upstream_sync_repo: original-owner/original-repo # Change to the source repo
          
          # Set to true if you want to overwrite local modifications safely
          test_mode: false 
