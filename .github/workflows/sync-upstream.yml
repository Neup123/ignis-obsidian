name: Scheduled Auto-Merge Upstream

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows you to trigger it manually via the Actions tab

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # Fetches all history so git can merge properly

      - name: Configure Git Identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add and Fetch Upstream
        run: |
          git remote add upstream https://github.com/Nystik-gh/ignis.git
          git fetch upstream main

      - name: Merge Upstream into Fork
        run: |
          # Change 'main' to whatever branch name you are running your code from
          git checkout main
          
          # Attempt a standard git merge. 
          # The -m flag provides an automated commit message.
          git merge upstream/main -m "Automated merge: synced with upstream changes"

      - name: Push merged changes back to Fork
        run: |
          git push origin main
